<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulito Clean | Landscaping</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'pulito-green': '#2E7D32',
            'leaf-green': '#4CAF50',
            'clean-black': '#1A1A1A',
            'light-gray': '#F5F5F5'
          },
          fontFamily: {
            montserrat: ['Montserrat'],
            poppins: ['Poppins']
          }
        }
      }
    }
  </script>
</head>

<body class="font-poppins text-clean-black bg-white">

<!-- HEADER -->
<header class="border-b">
  <div class="max-w-6xl mx-auto flex justify-between items-center px-6 py-4">
    <div class="flex items-center gap-3">
      <img src="assets/pulito-main-logo.png"
           class="h-12 w-12 rounded-full object-cover border-2 border-white bg-white shadow-sm">
      <h1 class="font-montserrat font-bold text-xl">
        <span class="text-pulito-green">Pulito</span>
        <span>Clean</span>
      </h1>
    </div>

    <nav class="flex gap-6 text-sm">
      <a href="index.html" class="text-pulito-green">Home</a>
      <a href="story.html">Our Story</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="bg-light-gray py-20 text-center px-6">
  <div class="max-w-5xl mx-auto">

    <img src="assets/pulito-main-logo.png"
         class="h-32 w-32 mx-auto mb-8 rounded-full object-cover border-2 border-white bg-white shadow-sm">

    <h2 class="font-montserrat text-5xl font-bold mb-6">
      Clean. Reliable. Professional.
      <span class="block text-pulito-green mt-2">Nature-Focused Landscaping</span>
    </h2>

    <p class="text-lg mb-8 max-w-2xl mx-auto">
      We create clean, structured outdoor spaces that elevate your property and make maintenance effortless.
    </p>

    <a href="contact.html"
       class="bg-pulito-green text-white px-8 py-3 rounded hover:bg-leaf-green transition">
      Book a Free Quote
    </a>

  </div>
</section>

<!-- WORK -->
<section class="py-16 px-6 max-w-6xl mx-auto">
  <h3 class="font-montserrat text-3xl text-center mb-10">Our Work</h3>

  <div class="grid md:grid-cols-3 gap-6">
    <img src="https://images.unsplash.com/photo-1598902108854-10e335adac99" class="h-64 w-full object-cover rounded">
    <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6" class="h-64 w-full object-cover rounded">
    <img src="https://images.unsplash.com/photo-1501594907352-04cda38ebc29" class="h-64 w-full object-cover rounded">
    <img src="https://images.unsplash.com/photo-1502082553048-f009c37129b9" class="h-64 w-full object-cover rounded">
    <img src="https://images.unsplash.com/photo-1558904541-efa843a96f01" class="h-64 w-full object-cover rounded">
    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" class="h-64 w-full object-cover rounded">
  </div>
</section>

<footer class="bg-light-gray py-6 text-center text-sm">
  © 2026 Pulito Clean
</footer>

</body>
</html>
