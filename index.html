<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulito Clean | Landscaping</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'pulito-green': '#2E7D32',
            'leaf-green': '#4CAF50',
            'clean-black': '#1A1A1A',
            'light-gray': '#F5F5F5',
            'mulch-brown': '#6B3E1F',
            'soil-brown': '#4E2D17'
          },
          fontFamily: {
            montserrat: ['Montserrat', 'sans-serif'],
            poppins: ['Poppins', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>

<body class="font-poppins text-clean-black bg-white">

<!-- HEADER / NAVBAR -->
<header class="border-b bg-white">
  <div class="max-w-6xl mx-auto flex items-center justify-between px-6 py-4">

    <!-- BRAND -->
    <div class="flex items-center gap-3">
      <img src="assets/Pulito-Main-Logo.png"
           alt="Pulito Clean Logo"
           class="h-12 w-auto object-contain">

      <h1 class="font-montserrat font-bold text-xl leading-none">
        <span class="text-pulito-green">Pulito</span>
        <span class="text-clean-black">Clean</span>
      </h1>
    </div>

    <!-- NAV LINKS -->
    <nav class="flex items-center gap-6 text-sm">
      <a href="index.html" class="hover:text-leaf-green transition">Home</a>
      <a href="story.html" class="hover:text-leaf-green transition">Our Story</a>
      <a href="contact.html" class="hover:text-leaf-green transition">Contact</a>
    </nav>

  </div>
</header>

<!-- HERO -->
<section class="bg-light-gray py-20 px-6">
  <div class="max-w-5xl mx-auto text-center">

    <!-- Logo Accent -->
    <div class="flex justify-center mb-6">
      <img src="assets/pulito-main-logo.png"
           alt="Pulito Clean Logo"
           class="h-16 md:h-20 w-auto object-contain">
    </div>

    <!-- Headline -->
    <h2 class="font-montserrat text-4xl md:text-5xl font-bold mb-6 leading-tight">
      Clean. Reliable. Professional.
      <span class="block text-pulito-green mt-2">
        Nature-Focused Landscaping
      </span>
    </h2>

    <!-- Subtext -->
    <p class="text-lg max-w-2xl mx-auto mb-8">
      Structured outdoor spaces designed with precision, balance, and long-term quality in mind.
    </p>

    <!-- CTA -->
    <a href="contact.html"
       class="inline-block bg-pulito-green text-white px-8 py-3 rounded hover:bg-leaf-green transition font-medium">
      Book a Free Quote
    </a>

  </div>
</section>

<!-- OUR WORK -->
<section class="py-16 px-6 max-w-6xl mx-auto">
  <h3 class="font-montserrat text-3xl font-semibold mb-10 text-center">
    Our Work
  </h3>

  <div class="grid md:grid-cols-3 gap-6">

    <img src="https://images.unsplash.com/photo-1598902108854-10e335adac99"
         class="w-full h-64 object-cover rounded">

    <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6"
         class="w-full h-64 object-cover rounded">

    <img src="https://images.unsplash.com/photo-1501594907352-04cda38ebc29"
         class="w-full h-64 object-cover rounded">

    <img src="https://images.unsplash.com/photo-1502082553048-f009c37129b9"
         class="w-full h-64 object-cover rounded">

    <img src="https://images.unsplash.com/photo-1558904541-efa843a96f01"
         class="w-full h-64 object-cover rounded">

    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7"
         class="w-full h-64 object-cover rounded">

  </div>
</section>

<!-- FOOTER -->
<footer class="bg-light-gray py-6 text-center text-sm">
  <p>© 2026 Pulito Clean. All rights reserved.</p>
</footer>

</body>
</html>
